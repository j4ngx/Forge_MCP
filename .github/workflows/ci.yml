# =============================================================================
# ci.yml — Lint, test, and smoke-test on every push / PR
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.10,<0.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.10,<0.11"
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Run test suite
        run: uv run pytest -v --tb=short

      - name: Verify server imports
        run: |
          uv run python -c "
          from server import mcp
          tools = mcp._tool_manager.list_tools()
          print(f'OK — {len(tools)} tools registered')
          assert len(tools) == 5, f'Expected 5 tools, got {len(tools)}'
          "

      - name: Verify all tool imports
        run: |
          uv run python -c "
          from tools.review_pr import review_pr, TOOL_NAME as N1
          from tools.apply_issue import apply_issue, TOOL_NAME as N2
          from tools.scaffold_project import scaffold_project, TOOL_NAME as N3
          from tools.progressive_commit import progressive_commit, TOOL_NAME as N4
          from tools.create_pr import create_pr, TOOL_NAME as N5
          print(f'All 5 tool imports OK: {N1}, {N2}, {N3}, {N4}, {N5}')
          "
